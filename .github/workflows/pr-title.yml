name: PR Title

on:
    pull_request_target:
        types: [opened, edited, synchronize]

permissions:
    pull-requests: read

jobs:
    validate:
        name: Validate PR title
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v6
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      chore
                      ci
                      docs
                      test
                      refactor
                      perf
                  requireScope: false
