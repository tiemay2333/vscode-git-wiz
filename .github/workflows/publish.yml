name: Publish

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        name: Publish to VS Code Marketplace
        runs-on: ubuntu-latest
        environment: prod
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Check if version is already tagged
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "value=$VERSION" >> $GITHUB_OUTPUT

                  if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "ERROR: Version '$VERSION' is not in x.x.x format" >&2
                    exit 1
                  fi

                  if git tag --list "v$VERSION" | grep -q .; then
                    echo "tagged=true" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  echo "tagged=false" >> $GITHUB_OUTPUT

                  LATEST_TAG=$(git tag --list 'v*' | sort -V | tail -1)
                  if [ -n "$LATEST_TAG" ]; then
                    LATEST_VERSION="${LATEST_TAG#v}"
                    if [ "$(printf '%s\n' "$LATEST_VERSION" "$VERSION" | sort -V | tail -1)" != "$VERSION" ] || [ "$LATEST_VERSION" = "$VERSION" ]; then
                      echo "ERROR: Version '$VERSION' must be greater than latest tag '$LATEST_TAG'" >&2
                      exit 1
                    fi
                  fi

            - name: Install dependencies
              if: steps.version.outputs.tagged == 'false'
              run: pnpm install --frozen-lockfile

            - name: Build
              if: steps.version.outputs.tagged == 'false'
              run: pnpm run compile

            - name: Publish to VS Code Marketplace
              if: steps.version.outputs.tagged == 'false'
              run: pnpm dlx @vscode/vsce publish --no-dependencies
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Publish to Open VSX
              if: steps.version.outputs.tagged == 'false'
              run: pnpm dlx ovsx publish --no-dependencies
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}

            - name: Package extension
              if: steps.version.outputs.tagged == 'false'
              run: pnpm dlx @vscode/vsce package --no-dependencies

            - name: Tag release
              if: steps.version.outputs.tagged == 'false'
              run: |
                  git tag "v${{ steps.version.outputs.value }}"
                  git push origin "v${{ steps.version.outputs.value }}"

            - name: Create GitHub release
              if: steps.version.outputs.tagged == 'false'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "v${{ steps.version.outputs.value }}" \
                    *.vsix \
                    --title "v${{ steps.version.outputs.value }}" \
                    --generate-notes
